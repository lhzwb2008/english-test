<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coze Prompt Lab</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <header class="top">
      <h1>Coze Prompt Lab</h1>
      <p class="sub">
        在后台创建并发布 API 智能体后，在此登记 <code>bot_id</code>，本地维护 Prompt
        文案并用同一 ID 发消息调试。
      </p>
      <div id="health" class="health" aria-live="polite"></div>
    </header>

    <main class="grid">
      <section class="panel">
        <h2>智能体</h2>
        <form id="add-agent" class="row">
          <input
            name="botId"
            type="text"
            placeholder="bot_id（控制台复制）"
            required
            autocomplete="off"
          />
          <input name="name" type="text" placeholder="显示名称（可选）" />
          <button type="submit">登记</button>
        </form>
        <ul id="agent-list" class="agent-list"></ul>
      </section>

      <section class="panel stretch">
        <h2>Prompt（本地副本）</h2>
        <p class="hint">
          与 Coze 控制台里的「人设与回复逻辑」对应；改完后请在控制台同步粘贴，或通过后续
          API 扩展自动同步。
        </p>
        <textarea id="prompt-body" rows="18" placeholder="先选择一个智能体…"></textarea>
        <div class="row actions">
          <button type="button" id="save-prompt">保存到 prompts/&lt;id&gt;.md</button>
          <span id="prompt-status" class="status"></span>
        </div>
      </section>

      <section class="panel">
        <h2>调试对话</h2>
        <textarea id="debug-msg" rows="5" placeholder="输入测试消息…"></textarea>
        <div class="row">
          <button type="button" id="send-debug">发送</button>
        </div>
        <pre id="debug-out" class="out"></pre>
      </section>
    </main>

    <script type="module" src="/main.js"></script>
  </body>
</html>
