<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1a1a2e">
  <title>English Voice Tutor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --success: #22c55e;
      --danger: #ef4444;
      --bg-dark: #0f0f1a;
      --bg-card: #1a1a2e;
      --bg-input: #252542;
      --text-primary: #fff;
      --text-secondary: #a1a1aa;
      --border: #3f3f5a;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-dark);
      color: var(--text-primary);
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      padding: 10px 16px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header h1 { font-size: 15px; font-weight: 600; }
    .header h1::before { content: '🎙️ '; }

    .status-badge {
      padding: 3px 8px;
      border-radius: 8px;
      font-size: 11px;
      background: var(--bg-input);
      color: var(--text-secondary);
    }
    .status-badge.connected { background: rgba(34, 197, 94, 0.2); color: var(--success); }
    .status-badge.recording { background: rgba(239, 68, 68, 0.2); color: var(--danger); }

    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 10px;
      gap: 10px;
      overflow: hidden;
    }

    .chat-container {
      flex: 1;
      background: var(--bg-card);
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-messages {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .message {
      max-width: 85%;
      padding: 8px 12px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.4;
    }
    .message.user { align-self: flex-end; background: var(--primary); }
    .message.assistant { align-self: flex-start; background: var(--bg-input); }
    .message.system { align-self: center; background: none; color: var(--text-secondary); font-size: 11px; }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      text-align: center;
      padding: 16px;
    }
    .empty-state-icon { font-size: 32px; margin-bottom: 8px; }
    .empty-state h3 { font-size: 14px; margin-bottom: 4px; color: var(--text-primary); }
    .empty-state p { font-size: 12px; }

    .asr-container {
      padding: 6px 10px;
      background: var(--bg-input);
      border-top: 1px solid var(--border);
      min-height: 28px;
    }
    .asr-text { font-size: 12px; color: var(--text-secondary); font-style: italic; }
    .asr-text.final { color: var(--text-primary); font-style: normal; }
    .asr-text:empty::before { content: '识别结果显示在这里'; color: var(--border); font-size: 11px; }

    .voice-control {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 14px;
      background: var(--bg-card);
      border-radius: 10px;
    }

    .visualizer {
      display: flex;
      gap: 3px;
      height: 24px;
      align-items: center;
    }
    .visualizer-bar {
      width: 3px;
      height: 12px;
      background: var(--primary);
      border-radius: 2px;
    }
    .visualizer.active .visualizer-bar { animation: viz 0.5s infinite; }
    .visualizer.active .visualizer-bar:nth-child(1) { animation-delay: 0s; }
    .visualizer.active .visualizer-bar:nth-child(2) { animation-delay: 0.1s; }
    .visualizer.active .visualizer-bar:nth-child(3) { animation-delay: 0.2s; }
    .visualizer.active .visualizer-bar:nth-child(4) { animation-delay: 0.3s; }
    .visualizer.active .visualizer-bar:nth-child(5) { animation-delay: 0.4s; }
    @keyframes viz { 0%, 100% { height: 6px; } 50% { height: 22px; } }

    .button-group { display: flex; gap: 10px; align-items: center; }

    .connect-btn {
      padding: 12px 24px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }
    .connect-btn:hover:not(:disabled) { background: var(--primary-dark); }
    .connect-btn:disabled { opacity: 0.6; }

    .mic-button {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      font-size: 26px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
    }
    .mic-button:active { transform: scale(0.95); }
    .mic-button.recording {
      background: linear-gradient(135deg, var(--danger), #dc2626);
      animation: rec-pulse 1s infinite;
    }
    .mic-button:disabled { opacity: 0.5; cursor: not-allowed; }
    @keyframes rec-pulse { 0%, 100% { box-shadow: 0 4px 12px rgba(239, 68, 68, 0.4); } 50% { box-shadow: 0 4px 24px rgba(239, 68, 68, 0.6); } }

    .test-btn {
      padding: 8px 14px;
      background: var(--bg-input);
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
    }
    .test-btn:disabled { opacity: 0.5; }

    .voice-hint { font-size: 12px; color: var(--text-secondary); }

    @supports (padding-bottom: env(safe-area-inset-bottom)) {
      .voice-control { padding-bottom: calc(14px + env(safe-area-inset-bottom)); }
    }
  </style>
</head>
<body>
  <header class="header">
    <h1>English Voice Tutor</h1>
    <span class="status-badge" id="statusBadge">未连接</span>
  </header>

  <main class="main-content">
    <section class="chat-container">
      <div class="chat-messages" id="chatMessages">
        <div class="empty-state" id="emptyState">
          <div class="empty-state-icon">🗣️</div>
          <h3>英语发音练习</h3>
          <p>连接后点击麦克风开始对话</p>
        </div>
      </div>
      <div class="asr-container">
        <span class="asr-text" id="asrText"></span>
      </div>
    </section>

    <section class="voice-control">
      <div class="visualizer" id="visualizer">
        <div class="visualizer-bar"></div>
        <div class="visualizer-bar"></div>
        <div class="visualizer-bar"></div>
        <div class="visualizer-bar"></div>
        <div class="visualizer-bar"></div>
      </div>
      <div class="button-group">
        <button class="connect-btn" id="connectBtn">点击连接</button>
        <button class="mic-button" id="micButton" disabled style="display:none;">🎤</button>
        <button class="test-btn" id="testBtn" disabled style="display:none;">📝测试</button>
      </div>
      <p class="voice-hint" id="voiceHint">点击连接开始</p>
    </section>
  </main>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
